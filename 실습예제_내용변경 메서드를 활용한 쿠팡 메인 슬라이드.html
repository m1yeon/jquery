<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내용변경 메서드를 활용한 쿠팡 메인 슬라이드</title>
  <style>
    *{margin: 0px auto; padding: 0px;}
    li{list-style: none;}
    img{display: block;}

    h2{padding: 20px; text-align: center;}


    .main_banner{
    position: relative;
    margin: 0px auto;
    height: 450px;
    }
    .main_banner h3{display: none;}
    .main_banner nav, .mabin_banner #main_img{position: absolute;}
    .main_banner nav{
      top: 50%; transform: translateY(-50%);
      right: 10%;
    }
    .main_banner li{
    }
    .main_banner a{
      display: block;
      border: 2px solid #fff;
      transition: 0.5;
    }
    .main_banner a:hover{
      border: 2px solid #346aff;
    }
    .main_banner #main_img{
      width: 100%; 

    }



  </style>
</head>
<body>
  <h2>내용변경 메서드를 활용한 쿠팡 메인 슬라이드</h2>
  <article class="main_banner">
    <h3>쿠팡 메인 슬라이드</h3>
    <nav>
      <ul>
        <li><a href="./images/coupang_m01.jpg" title="메인1">
          <img src="./images/coupang_n01.jpg" alt="메인1">
        </a></li>
        <li><a href="./images/coupang_m02.jpg" title="메인2">
          <img src="./images/coupang_n02.jpg" alt="메인2">
        </a></li>
        <li><a href="./images/coupang_m03.jpg" title="메인3">
          <img src="./images/coupang_n03.jpg" alt="메인3">
        </a></li>
        <li><a href="./images/coupang_m04.jpg" title="메인4">
          <img src="./images/coupang_n04.jpg" alt="메인4">
        </a></li>
        <li><a href="./images/coupang_m05.jpg" title="메인5">
          <img src="./images/coupang_n05.jpg" alt="메인5">
        </a></li>
        <li><a href="./images/coupang_m06.jpg" title="메인6">
          <img src="./images/coupang_n06.jpg" alt="메인6">
        </a></li>
      </ul>
    </nav>
    <img src="./images/coupang_m01.jpg" alt="메인1" id="main_img">
  </article>

  <!-- 제이쿼리 라이브러리 -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>

  <script>
    $(document).ready(function(){
      // 변수에 담기
      let img_src;
      let main_ban = $('.main_banner nav li a');


      //카테고리에 마우스 엔터시 
      main_ban.mouseenter(function(){
        img_src = $(this).attr('href'); //변수 img_src에 main.ban의 a태그의 href 속성을 담아줌
        console.log(img_src); //잘 나오는지 테스트

        $('#main_img').attr('src',img_src); //main_img의 src속성을 변경해줌 -> 변수 img_src에 담긴 내용으로

      });


    });
  </script>




</body>
</html>
