<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실습예제02_스타벅스 모바일 2단 내비게이션 구현하기</title>

  <!-- 아이콘폰트 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- 초기화 -->
  <link rel="stylesheet" href="./css/reset.css" type="text/css">

  <style>
    h2,p{padding: 10px;}
    a{color: #333; text-decoration: none;}
    .gnb{
      width: 100%; height: 100%;
      background: rgba(0,0,0,.7);
    }

    .gnb > ul{
      width: 400px;
      margin: 0px auto;
    }
    .gnb > ul > li{clear:right; text-indent: 10px; border-bottom: 1px solid#fff;}

    .gnb > ul > li a{color: #fff;}
    .gnb > ul > li a:hover{text-decoration: underline;}

    .gnb > ul > li > a{
      display: block;
      width: 100%;
      line-height: 40px;
      background-color: green;
    }

    i.fa-angle-down{
      float: right;
      font-size: 1.3rem;padding: 10px 8px;
    }

    .sub{
      width: 100%;
      background: #000;
      display:none
    }
    .sub > li{}
    .sub > li > a{
      display: block;
      font-size: 0.9rem;
      line-height: 36px;
    }

    .act{
      transform: rotate(180deg) translateX(-10px)!important; 
    }
  </style>

  <!-- 제이쿼리 라이브러리 -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>

  <script>
    $(document).ready(function(){
      //1.변수선언
      const mnu = $('.gnb > ul > li > a');
      
      //2. 클릭 이벤트 _ 메인 메뉴 클릭시 해당 서브 나오게 하기
      mnu.click(function(){
        // alert('클릭'); 
        //1. 서브메뉴 펼치기 기능 구현
        // $(this).next().slideToggle();
        // $(this).find('i').addClass('act'); //부모안에서 자식 요소를 찾을 때는 find() 메서드를 사용

        //2. 아코디언 메뉴
        $('.sub').slideUp(); //모든 서브 메뉴 위로 접고
        $(this).next().slideDown(); //선택한 메뉴의 서브만 나오게 함
        $('i').removeClass('act'); //모든 i태그에 act서식을 제거하고
        $(this).find('i').addClass('act'); // 선택한 메뉴의 자손 i태그에 act서식을 적용함

      });


    });
  </script>


</head>
<body>
  <h2>실습예제02_스타벅스 모바일 2단 내비게이션 구현하기</h2>
  <p>2단 목록을작성하여 스타벅스 모바일 메뉴 클릭시 서브메뉴 펼치기/접기</p>
  
  <nav  class="gnb">
    <ul>
      <li><a href="#" title="메인메뉴1">메인메뉴1 <i class="fas fa-angle-down"></i></a>
        <ul class="sub">
          <li><a href="#" title="서브메뉴1">서브메뉴1</a></li>
          <li><a href="#" title="서브메뉴2">서브메뉴2</a></li>
          <li><a href="#" title="서브메뉴3">서브메뉴3</a></li>
        </ul>
      </li>

      <li><a href="#" title="메인메뉴2">메인메뉴2 <i class="fas fa-angle-down"></i></a>
        <ul class="sub">
          <li><a href="#" title="서브메뉴1">서브메뉴1</a></li>
          <li><a href="#" title="서브메뉴2">서브메뉴2</a></li>
          <li><a href="#" title="서브메뉴3">서브메뉴3</a></li>
        </ul>
      </li>

      <li><a href="#" title="메인메뉴3">메인메뉴3 <i class="fas fa-angle-down"></i></a>
        <ul class="sub">
          <li><a href="#" title="서브메뉴1">서브메뉴1</a></li>
          <li><a href="#" title="서브메뉴2">서브메뉴2</a></li>
          <li><a href="#" title="서브메뉴3">서브메뉴3</a></li>
        </ul>
      </li>
    </ul>
  </nav>


  <br><hr><br>
  <h3>모바일 메뉴목록을 응용하여 '아코디언'메뉴 또는 '질문과 답변'목록 개발 가능</h3>
</body>
</html>
